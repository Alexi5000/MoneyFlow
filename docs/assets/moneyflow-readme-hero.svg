      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.10 0 0 0 0 0.70 0 0 0 0 0.28 0 0 0 0.75 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#1f3b2e" stroke-opacity="0.35" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" rx="34" fill="url(#bgGlow)"/>

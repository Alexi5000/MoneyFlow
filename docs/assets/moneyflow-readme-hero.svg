<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MoneyFlow automation budget tracker dashboard preview</title>
  <desc id="desc">A dark, premium dashboard hero graphic showing MoneyFlow analytics, budget health, transaction intelligence, and cash-flow visualizations.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="10%" r="90%">
      <stop offset="0%" stop-color="#1f3b2e"/>
      <stop offset="34%" stop-color="#0b1512"/>
      <stop offset="100%" stop-color="#050807"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111c18"/>
      <stop offset="100%" stop-color="#07100d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="47%" stop-color="#84cc16"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#facc15"/>
